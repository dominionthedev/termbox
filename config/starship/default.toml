# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  starship.toml — dominionthedev dotfiles
#  Theme: Catppuccin Mocha
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 10000
scan_timeout = 2000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$golang\
$rust\
$python\
$nodejs\
$dart\
$lua\
$docker_context\
$package\
$custom\
$fill\
$cmd_duration\
$jobs\
$status\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
vimcmd_symbol = "[❮](bold #cba6f7)"
vimcmd_replace_one_symbol = "[❮](bold #f9e2af)"
vimcmd_replace_symbol = "[❮](bold #f9e2af)"
vimcmd_visual_symbol = "[❮](bold #f5c2e7)"

[directory]
style = "bold #89b4fa"
read_only = " 󰌾"
read_only_style = "#f38ba8"
home_symbol = "󰋞 ~"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Developer" = "󰚩 dev"
"Documents" = "󰈙 "
"Downloads" = " "
"go/src" = "󰟓 go"
".dotfiles" = " dotfiles"

[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 25
truncation_symbol = "…"

[git_status]
style = "#f38ba8"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "󰩌 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = "[✓](bold #a6e3a1)"
untracked = "? "
stashed = "󰏗 "
modified = "! "
staged = "+ "
renamed = "󰑕 "
deleted = "✘ "

[git_state]
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "
style = "bold #f9e2af"
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "CHERRY"
bisect = "BISECT"

[git_metrics]
disabled = false
added_style = "bold #a6e3a1"
deleted_style = "bold #f38ba8"
format = "[+$added]($added_style) [-$deleted]($deleted_style) "

[golang]
symbol = "󰟓 "
style = "bold #89dceb"
format = "[$symbol($version )]($style)"
detect_files = ["go.mod", "go.sum", "*.go"]

[rust]
symbol = "󱘗 "
style = "bold #fab387"
format = "[$symbol($version )]($style)"
detect_files = ["Cargo.toml", "*.rs"]

[python]
symbol = " "
style = "bold #f9e2af"
format = "[$symbol$pyenv_prefix($version )($virtualenv )]($style)"
detect_files = ["pyproject.toml", "requirements.txt", "*.py", ".python-version"]
pyenv_version_name = false

[nodejs]
style = "bold #a6e3a1"
format = "[$symbol($version )]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts"]

[lua]
style = "bold #89b4fa"
format = "[$symbol($version )]($style)"

[docker_context]
style = "bold #89b4fa"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[package]
symbol = "󰏗 "
style = "bold #f5c2e7"
format = "[$symbol$version]($style) "

[conda]
symbol = "🅒 "
style = "bold #94e2d5"
format = "[$symbol$environment]($style) "

[kubernetes]
symbol = "☸ "
style = "bold #89b4fa"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

[status]
symbol = "✖ "
style = "bold #f38ba8"
format = "[$symbol$status]($style) "
disabled = false

[cmd_duration]
min_time = 2_000
style = "bold #f9e2af"
format = "[󱦟 $duration]($style) "

[jobs]
symbol = "󰠜 "
style = "bold #f38ba8"
format = "[$symbol$number]($style) "
number_threshold = 1

[fill]
symbol = " "

# ── Custom modules ────────────────────────────────────

# Active tmux session name in prompt
[custom.tmux]
command = "tmux display-message -p '#S' 2>/dev/null || echo ''"
when = "[ -n \"$TMUX\" ]"
format = "[  $output]($style) "
style = "bold #cba6f7"

# Python venv name
[custom.venv]
command = "basename \"$VIRTUAL_ENV\" 2>/dev/null || echo ''"
when = "[ -n \"$VIRTUAL_ENV\" ]"
format = "[ $output]($style) "
style = "bold #f9e2af"

# Local AI / ShellAI ready (port 1221)
[custom.ai_ready]
command = "echo ' AI'"
when = "nc -z -w 1 localhost 11434 >/dev/null 2>&1"
format = "[$output]($style) "
style = "bold #a6e3a1"

# Extended git info — enable if desired
[custom.git_detailed]
command = "~/Developer/termbox/scripts/starship/git-detailed.sh"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[$output]($style) "
style = "bold #94e2d5"
disabled = true

[custom.docker_status]
command = "~/Developer/termbox/scripts/starship/docker-status.sh"
when = "command -v docker >/dev/null 2>&1"
format = "[$output]($style) "
style = "bold #89b4fa"
disabled = true

[custom.k8s]
command = "~/Developer/termbox/scripts/starship/k8s-context.sh"
when = "command -v kubectl >/dev/null 2>&1 && [ -f ~/.kube/config ]"
format = "[$output]($style) "
style = "bold #89b4fa"
disabled = true
