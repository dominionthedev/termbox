# ============================================================================
# Termbox Tmux Configuration
# ============================================================================

# ============================================================================
# General Settings
# ============================================================================

# True color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Set history limit
set -g history-limit 50000

# Faster command sequences
set -s escape-time 0

# Focus events enabled for vim/neovim
set -g focus-events on

# Aggressive resize
setw -g aggressive-resize on

# ============================================================================
# Key Bindings
# ============================================================================

# Remap prefix to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config with r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing with Shift
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Kill pane without confirmation
bind x kill-pane

# Copy mode with vim bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Synchronize panes
bind a setw synchronize-panes

# Quick layouts
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# ============================================================================
# Custom Hooks & Integrations
# ============================================================================

# Hook to update status on pane change
set-hook -g pane-focus-in 'run-shell "$TERMBOX_HOME/scripts/tmux/pane-focus.sh"'

# Hook after new window
set-hook -g after-new-window 'run-shell "$TERMBOX_HOME/scripts/tmux/new-window.sh"'

# Hook after session created
set-hook -g after-new-session 'run-shell "$TERMBOX_HOME/scripts/tmux/new-session.sh #{session_name}"'

# ============================================================================
# Session Templates Integration. fix the scripts
# ============================================================================

# Create menu for templates
bind T display-menu -T "Session Templates" \
    "Default" d "run-shell '$TERMBOX_HOME/scripts/tmux/templates/default.sh \"#{session_name}\"'" \
    "Dev" v "run-shell '$TERMBOX_HOME/scripts/tmux/templates/dev.sh \"#{session_name}\"'" \
    "Ops" o "run-shell '$TERMBOX_HOME/scripts/tmux/templates/ops.sh \"#{session_name}\"'" \
    "" \
    "Cancel" q ""

# ===============================================================================
# Catppuccin Mocha Theme
# ===============================================================================

# Pane borders (Catppuccin Mocha)
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# Pane numbers
set -g display-panes-time 2000
set -g display-panes-colour '#585b70'
set -g display-panes-active-colour '#cba6f7'

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Status bar update interval
set -g status-interval 1

# ===============================================================================================
# Status Bar Layout
# ===============================================================================================

# Left side - Session info with indicator
set -g status-left-length 50
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] #{?client_prefix,⌨  ,}󰣐 #S #[bg=#1e1e2e,fg=#cba6f7]'

# Right side - System info with custom scripts
set -g status-right-length 150
set -g status-right '#{?window_zoomed_flag,#[bg=#f9e2af,fg=#1e1e2e,bold] 󰊓 ZOOM ,}#[fg=#313244]#[bg=#313244,fg=#89dceb] #($TERMBOX_HOME/scripts/tmux/git-status.sh) #[bg=#1e1e2e,fg=#585b70] │ #[fg=#b4befe]%H:%M:%S #[fg=#585b70]│ #[fg=#a6e3a1]%Y-%m-%d #[fg=#585b70]│ #[fg=#cba6f7]#H '

# Window status
setw -g window-status-format '#[fg=#585b70] #I:#W#{?window_flags,#{window_flags}, } '
setw -g window-status-current-format '#[bg=#313244,fg=#cba6f7,bold] #I:#W#{?window_flags,#{window_flags}, } '

# Window status separator
setw -g window-status-separator ''

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style 'fg=#f9e2af,bold'

# Bell
set -g visual-bell off
set -g bell-action none

# ============================================================================
# Message Style
# ============================================================================

set -g message-style 'bg=#cba6f7 fg=#1e1e2e bold'
set -g message-command-style 'bg=#89b4fa fg=#1e1e2e'

# ============================================================================
# Window Modes
# ============================================================================

setw -g clock-mode-colour '#cba6f7'
setw -g mode-style 'bg=#cba6f7 fg=#1e1e2e bold'

# ============================================================================
# Plugins
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
